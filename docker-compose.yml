services:
  db:
    image: postgres:14
    restart: on-failure
    env_file:
      - .env
    ports:
      - "5432:5432"

  mage:
    image: mageai/mageai:latest
    command: mage start sampa_transit
    restart: on-failure
    env_file:
      - .env
    ports:
      - "6789:6789"
    volumes:
      - .:/home/src
    depends_on:
      - db

  dashboard:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.14-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY dashboard.py .
        CMD ["streamlit", "run", "dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - ./sptrans_gold:/app/sptrans_gold